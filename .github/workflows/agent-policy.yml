name: agent-policy

on:
  pull_request:
    branches:
      - main

concurrency:
  group: agent-policy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  agent-policy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: research-agent
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run agent policy
        env:
          DIFF_POLICY_MODE: range
          DIFF_POLICY_BASE_REF: ${{ github.event.pull_request.base.sha }}
          DIFF_POLICY_HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: bun run agent-policy

      - name: Publish gate summary
        if: always()
        run: |
          {
            echo "## agent-policy workflow"
            echo
            echo "- Trigger: pull_request"
            echo "- Diff mode: range"
            echo "- Base ref: \`${DIFF_POLICY_BASE_REF}\`"
            echo "- Head ref: \`${DIFF_POLICY_HEAD_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DIFF_POLICY_BASE_REF: ${{ github.event.pull_request.base.sha }}
          DIFF_POLICY_HEAD_REF: ${{ github.event.pull_request.head.sha }}
